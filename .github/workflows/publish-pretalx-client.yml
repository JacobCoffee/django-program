name: Publish pretalx-client

on:
  release:
    types: [published]

jobs:
  check-tag:
    name: Check Tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should-publish: ${{ steps.check.outputs.match }}
    steps:
      - name: Check tag matches pretalx-client pattern
        id: check
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          if [[ "${TAG}" =~ ^pretalx-client/v[0-9] ]]; then
            echo "match=true" >> "${GITHUB_OUTPUT}"
          else
            echo "match=false" >> "${GITHUB_OUTPUT}"
          fi

  build:
    name: Build
    needs: [check-tag]
    if: needs.check-tag.outputs.should-publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: "0.10.2"
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Build package
        run: uv build --package pretalx-client

      - name: Upload dist artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/*

  sign:
    name: Sign
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: "0.10.2"

      - name: Download dist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist

      - name: Sign with sigstore
        run: uvx sigstore sign dist/*

      - name: Upload signed artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-signed
          path: dist/*

  upload-release-assets:
    name: Upload Release Assets
    needs: [sign]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download signed artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist-signed
          path: dist

      - name: Upload assets to GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2.3.2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: dist/*

  publish:
    name: Publish to PyPI
    needs: [sign]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi-pretalx-client
      url: https://pypi.org/project/pretalx-client/
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          attestations: true
