name: Publish pretalx-client

on:
  release:
    types: [published]

jobs:
  check-tag:
    name: Check Tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should-publish: ${{ steps.check.outputs.match }}
    steps:
      - name: Check tag matches pretalx-client pattern
        id: check
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          if [[ "${TAG}" =~ ^pretalx-client/v[0-9] ]]; then
            echo "match=true" >> "${GITHUB_OUTPUT}"
          else
            echo "match=false" >> "${GITHUB_OUTPUT}"
          fi

  build:
    name: Build
    needs: [check-tag]
    if: needs.check-tag.outputs.should-publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@6ee6290f1cbc4156c0bdd66691b2c144ef8df19a # v7.4.0
        with:
          version: "0.10.2"
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Build package
        run: uv build --package pretalx-client

      - name: Upload dist artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: dist
          path: dist/*

  sign:
    name: Sign
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Set up uv
        uses: astral-sh/setup-uv@6ee6290f1cbc4156c0bdd66691b2c144ef8df19a # v7.4.0
        with:
          version: "0.10.2"

      - name: Download dist artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: dist
          path: dist

      - name: Sign with sigstore
        run: uvx sigstore sign dist/*

      - name: Upload signed artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: dist-signed
          path: dist/*

  upload-release-assets:
    name: Upload Release Assets
    needs: [sign]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download signed artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: dist-signed
          path: dist

      - name: Upload assets to GitHub release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.3.2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: dist/*

  publish:
    name: Publish to PyPI
    needs: [sign]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi-pretalx-client
      url: https://pypi.org/project/pretalx-client/
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        with:
          attestations: true
