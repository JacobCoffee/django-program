{# _sponsor_revenue.html -- Sponsor revenue by level horizontal bars #}
{# Usage: {% include ".../_sponsor_revenue.html" with chart_data=chart_sponsor_revenue_json %} #}

<div class="card card--static">
  <div style="padding: 1.25rem 1.5rem 0.75rem; border-bottom: 1px solid var(--color-border-light);">
    <div style="font-weight: 700; font-size: 0.95rem; color: var(--color-text);">Revenue by Level</div>
    <div style="font-size: 0.78rem; color: var(--color-text-muted); margin-top: 0.1rem;">Sponsor revenue contribution per tier</div>
  </div>
  <div style="padding: 1rem 1.5rem 1.25rem;">
    <canvas id="chart-sponsor-revenue" style="width: 100%; height: 260px; display: block;"></canvas>
  </div>
</div>

<script>
(function() {
  var canvas = document.getElementById('chart-sponsor-revenue');
  if (!canvas) return;
  var u = window._chartUtils;
  if (!u) return;
  var data = JSON.parse('{{ chart_data|escapejs }}');

  function drawChart() {
    var s = u.setupCanvas(canvas);
    var ctx = s.ctx, w = s.w, h = s.h;
    if (!data || !data.length) { u.drawEmpty(ctx, w, h, 'No sponsor data'); return; }

    var maxRevenue = 0;
    for (var i = 0; i < data.length; i++) {
      if (data[i].revenue > maxRevenue) maxRevenue = data[i].revenue;
    }
    if (!maxRevenue) { u.drawEmpty(ctx, w, h, 'No sponsor revenue'); return; }

    var padL = 10, padR = 70, padT = 10, padB = 10;
    var labelW = 100;
    var maxItems = Math.min(data.length, 10);
    var rowH = Math.min(38, (h - padT - padB) / maxItems);
    var barAreaW = w - padL - labelW - padR;

    var rowRects = [];

    function draw(t) {
      var progress = u.easeOutCubic(t);
      ctx.clearRect(0, 0, w, h);
      rowRects = [];

      for (var i = 0; i < maxItems; i++) {
        var d = data[i];
        var rowY = padT + i * rowH;
        var barY = rowY + 6;
        var barH = rowH - 14;

        ctx.save();
        ctx.fillStyle = u.COLORS.text;
        ctx.font = '600 11px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
        ctx.textAlign = 'right';
        ctx.textBaseline = 'middle';
        var label = d.level_name.length > 12 ? d.level_name.substring(0, 11) + '\u2026' : d.level_name;
        ctx.fillText(label, padL + labelW - 10, barY + barH / 2);
        ctx.restore();

        var barX = padL + labelW;

        ctx.fillStyle = '#f0f1f4';
        u.roundRect(ctx, barX, barY, barAreaW, barH, 4);
        ctx.fill();

        var fillW = (d.revenue / maxRevenue) * barAreaW * progress;
        if (fillW > 0) {
          var color = u.CHART_PALETTE[i % u.CHART_PALETTE.length];
          var grad = ctx.createLinearGradient(barX, 0, barX + fillW, 0);
          grad.addColorStop(0, color);
          grad.addColorStop(1, u.hexToRgba(color, 0.7));
          ctx.fillStyle = grad;
          u.roundRect(ctx, barX, barY, fillW, barH, fillW >= barAreaW - 1 ? 4 : [4, 0, 0, 4]);
          ctx.fill();
        }

        if (progress > 0.8) {
          ctx.save();
          ctx.fillStyle = u.COLORS.textMuted;
          ctx.font = '700 10px "SF Mono", SFMono-Regular, Menlo, Consolas, monospace';
          ctx.textAlign = 'left';
          ctx.textBaseline = 'middle';
          ctx.fillText(u.formatCurrency(d.revenue), barX + barAreaW + 6, barY + barH / 2);
          ctx.restore();
        }

        rowRects.push({ y: rowY, h: rowH, idx: i });
      }
    }

    u.animate(700, draw, function() {
      canvas.addEventListener('mousemove', function(e) {
        var rect = canvas.getBoundingClientRect();
        var my = e.clientY - rect.top;
        var hit = null;
        for (var i = 0; i < rowRects.length; i++) {
          if (my >= rowRects[i].y && my < rowRects[i].y + rowRects[i].h) {
            hit = data[rowRects[i].idx]; break;
          }
        }
        if (hit) {
          canvas.style.cursor = 'pointer';
          u.showTooltip(e,
            '<div style="font-weight:700;margin-bottom:2px;">' + hit.level_name + '</div>' +
            '<div>Sponsors: <strong>' + hit.sponsor_count + '</strong></div>' +
            '<div>Revenue: <strong>' + u.formatCurrencyFull(hit.revenue) + '</strong></div>' +
            '<div>Cost each: <strong>' + u.formatCurrencyFull(hit.cost) + '</strong></div>'
          );
        } else {
          canvas.style.cursor = 'default';
          u.hideTooltip();
        }
      });
      canvas.addEventListener('mouseleave', function() { u.hideTooltip(); canvas.style.cursor = 'default'; });
    });
  }

  requestAnimationFrame(drawChart);
  window.addEventListener('resize', (function() {
    var timer;
    return function() { clearTimeout(timer); timer = setTimeout(drawChart, 200); };
  })());
})();
</script>
