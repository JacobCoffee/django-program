{# _room_utilization.html -- Per-room utilization horizontal bars with target line #}
{# Usage: {% include ".../_room_utilization.html" with chart_data=chart_room_util_json %} #}

<div class="card card--static">
  <div style="padding: 1.25rem 1.5rem 0.75rem; border-bottom: 1px solid var(--color-border-light);">
    <div style="font-weight: 700; font-size: 0.95rem; color: var(--color-text);">Room Utilization</div>
    <div style="font-size: 0.78rem; color: var(--color-text-muted); margin-top: 0.1rem;">Schedule slot fill rate per room</div>
  </div>
  <div style="padding: 1rem 1.5rem 1.25rem;">
    <canvas id="chart-room-utilization" style="width: 100%; height: 260px; display: block;"></canvas>
  </div>
</div>

<script>
(function() {
  var canvas = document.getElementById('chart-room-utilization');
  if (!canvas) return;
  var u = window._chartUtils;
  if (!u) return;
  var rawData = JSON.parse('{{ chart_data|escapejs }}');

  var data = rawData.rooms || rawData;
  var BENCHMARK_PCT = rawData.target_pct || 28;

  function drawChart() {
    var s = u.setupCanvas(canvas);
    var ctx = s.ctx, w = s.w, h = s.h;
    if (!data || !data.length) { u.drawEmpty(ctx, w, h, 'No room data'); return; }

    var padL = 10, padR = 50, padT = 10, padB = 10;
    var labelW = 110;
    var maxItems = Math.min(data.length, 10);
    var rowH = Math.min(34, (h - padT - padB) / maxItems);
    var barAreaW = w - padL - labelW - padR;

    var rowRects = [];

    function draw(t) {
      var progress = u.easeOutCubic(t);
      ctx.clearRect(0, 0, w, h);
      rowRects = [];

      for (var i = 0; i < maxItems; i++) {
        var d = data[i];
        var rowY = padT + i * rowH;
        var barY = rowY + 5;
        var barH = rowH - 12;
        var pct = d.utilization_pct || 0;

        ctx.save();
        ctx.fillStyle = u.COLORS.text;
        ctx.font = '600 11px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
        ctx.textAlign = 'right';
        ctx.textBaseline = 'middle';
        var label = d.room_name.length > 14 ? d.room_name.substring(0, 13) + '\u2026' : d.room_name;
        ctx.fillText(label, padL + labelW - 10, barY + barH / 2);
        ctx.restore();

        var barX = padL + labelW;

        ctx.fillStyle = '#f0f1f4';
        u.roundRect(ctx, barX, barY, barAreaW, barH, 4);
        ctx.fill();

        var fillW = (Math.min(pct, 100) / 100) * barAreaW * progress;
        if (fillW > 0) {
          var barColor;
          if (pct >= 70) barColor = u.COLORS.emerald;
          else if (pct >= 40) barColor = u.COLORS.amber;
          else barColor = u.COLORS.red;

          var grad = ctx.createLinearGradient(barX, 0, barX + fillW, 0);
          grad.addColorStop(0, barColor);
          grad.addColorStop(1, u.hexToRgba(barColor, 0.7));
          ctx.fillStyle = grad;
          u.roundRect(ctx, barX, barY, fillW, barH, fillW >= barAreaW - 1 ? 4 : [4, 0, 0, 4]);
          ctx.fill();
        }

        if (progress > 0.8) {
          ctx.save();
          ctx.fillStyle = u.COLORS.textMuted;
          ctx.font = '700 10px "SF Mono", SFMono-Regular, Menlo, Consolas, monospace';
          ctx.textAlign = 'left';
          ctx.textBaseline = 'middle';
          ctx.fillText(Math.round(pct) + '%', barX + barAreaW + 6, barY + barH / 2);
          ctx.restore();
        }

        rowRects.push({ y: rowY, h: rowH, idx: i });
      }

      var benchmarkX = padL + labelW + (BENCHMARK_PCT / 100) * barAreaW;
      ctx.save();
      ctx.setLineDash([4, 3]);
      ctx.strokeStyle = u.hexToRgba(u.COLORS.red, 0.5);
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(benchmarkX, padT);
      ctx.lineTo(benchmarkX, padT + maxItems * rowH - 4);
      ctx.stroke();
      ctx.setLineDash([]);

      if (progress > 0.5) {
        ctx.fillStyle = u.hexToRgba(u.COLORS.red, 0.7);
        ctx.font = '600 9px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText('Target: ' + BENCHMARK_PCT + '%', benchmarkX, padT + maxItems * rowH + 2);
      }
      ctx.restore();
    }

    u.animate(700, draw, function() {
      function findHitRow(e) {
        var rect = canvas.getBoundingClientRect();
        var my = e.clientY - rect.top;
        for (var i = 0; i < rowRects.length; i++) {
          if (my >= rowRects[i].y && my < rowRects[i].y + rowRects[i].h) return data[rowRects[i].idx];
        }
        return null;
      }

      canvas.addEventListener('mousemove', function(e) {
        var hit = findHitRow(e);
        if (hit) {
          canvas.style.cursor = 'pointer';
          u.showTooltip(e,
            '<div style="font-weight:700;margin-bottom:2px;">' + hit.room_name + '</div>' +
            '<div>Utilization: <strong>' + (hit.utilization_pct || 0).toFixed(1) + '%</strong></div>' +
            '<div>Talk slots: <strong>' + u.formatNumber(hit.talk_slots || 0) + '</strong> / ' + u.formatNumber(hit.total_slots || 0) + '</div>' +
            '<div style="font-size:10px;color:#aaa;margin-top:3px;">Click to view room</div>'
          );
        } else {
          canvas.style.cursor = 'default';
          u.hideTooltip();
        }
      });
      canvas.addEventListener('click', function(e) {
        var hit = findHitRow(e);
        if (hit && hit.room_id && window._drilldownUrls) {
          var base = window._drilldownUrls.roomList.replace(/\/$/, '');
          window.location.href = base + '/' + hit.room_id + '/edit/';
        } else if (window._drilldownUrls) {
          window.location.href = window._drilldownUrls.roomList;
        }
      });
      canvas.addEventListener('mouseleave', function() { u.hideTooltip(); canvas.style.cursor = 'default'; });
    });
  }

  requestAnimationFrame(drawChart);
  window.addEventListener('resize', (function() {
    var timer;
    return function() { clearTimeout(timer); timer = setTimeout(drawChart, 200); };
  })());
})();
</script>
